name: Deploy web

# Build the blame.today web client (Svelte + Vite) and deploy it to the Cloudflare
# Worker (Workers + Static Assets) on push to main. The worker (wrangler.jsonc) serves
# dist/ as static assets, 301-redirects www -> apex, and proxies /mcp to the separate
# blame-mcp worker. The /about prose ships in public/about/ (Vite copies it into dist/);
# its root-relative sibling links get rewritten to the clean (no-.html) form so CF serves
# them without a redirect hop.
#
# Migrated off GitHub Pages 2026-06-16 (the zone is on Cloudflare now; blame.today is a
# custom domain on the worker). Auth: CLOUDFLARE_API_TOKEN (Workers:Edit) + the
# CLOUDFLARE_ACCOUNT_ID, both repo secrets.

on:
  push:
    branches: [main]
    # A push touching ONLY scripts/** (e.g. the hits counter) doesn't change the
    # built site, so skip the rebuild+deploy for script-only pushes.
    paths-ignore:
      - 'scripts/**'
      # infra/ is OpenTofu (the CF clicky-layer) — applied separately, not a site rebuild.
      - 'infra/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-web
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          # node 24 (npm 11) matches the npm that wrote package-lock.json. node 22 ships
          # npm 10, whose resolver computes a different tree and rejects the lock on `npm ci`.
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Build + test
        run: |
          npm ci
          # unit tests gate the deploy — they sat red for a week once because nothing ran them.
          npm test
          npm run build

      - name: Rewrite /about sibling links to clean URLs
        run: |
          set -euo pipefail
          # /about prose is authored root-relative ("/why.html"); rewrite to the clean
          # extensionless form CF serves so there's no redirect hop. source stays untouched.
          for f in dist/about/*.html; do
            sed -i -E 's#href="/([a-z0-9_-]+)\.html"#href="\1"#g' "$f"
          done

      - name: Deploy to Cloudflare Worker (Static Assets)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 deploy
